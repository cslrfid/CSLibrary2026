name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: netstandard2.0
            dotnet-version: "2.0"
            prerelease: false
          - target: net10.0
            dotnet-version: "10.0"
            prerelease: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}
          include-prerelease: ${{ matrix.prerelease }}

      - name: Restore
        run: >
          dotnet restore CSLibrary2026/CSLibrary2026.csproj
          --framework ${{ matrix.target }}

      - name: Build
        run: >
          dotnet build CSLibrary2026/CSLibrary2026.csproj
          -c Release
          --framework ${{ matrix.target }}

      - name: Pack
        run: >
          dotnet pack CSLibrary2026/CSLibrary2026.csproj
          -c Release
          -o ./nupkg
          --no-build

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-${{ matrix.target }}
          path: ./nupkg/*.nupkg

  test:
    name: Test (net10.0)
    runs-on: ubuntu-latest
    # Hardware integration tests are excluded in CI per constitution §6.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0
          include-prerelease: true

      - name: Restore tests
        run: dotnet restore CSLibrary2026/Tests/CSLibrary2026.Tests/CSLibrary2026.Tests.csproj

      - name: Build tests
        run: dotnet build CSLibrary2026/Tests/CSLibrary2026.Tests/CSLibrary2026.Tests.csproj -c Release

      - name: Run tests
        run: >
          dotnet test CSLibrary2026/Tests/CSLibrary2026.Tests/CSLibrary2026.Tests.csproj
          -c Release
          --filter "Category!=integration"
          --logger "trx;LogFileName=results.trx"
